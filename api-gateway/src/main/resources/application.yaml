server:
  port: 8080

app:
  gateway-url: http://localhost:8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: account-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/accounts/**

            - id: account-service-docs
              uri: http://localhost:8084
              predicates:
                - Path=/account-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Accept-Encoding
                - name: ModifyResponseBody
                  args:
                    inClass: java.lang.String
                    outClass: java.lang.String
                    rewriteFunction: "#{@openApiRewriteFunction}"

            - id: transaction-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/transactions/**

            - id: transaction-service-docs
              uri: http://localhost:8082
              predicates:
                - Path=/transaction-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Accept-Encoding
                - name: ModifyResponseBody
                  args:
                    inClass: java.lang.String
                    outClass: java.lang.String
                    rewriteFunction: "#{@openApiRewriteFunction}"

            - id: notification-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/notifications/**

            - id: notification-service-docs
              uri: http://localhost:8083
              predicates:
                - Path=/notification-service/v3/api-docs/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Accept-Encoding
                - name: ModifyResponseBody
                  args:
                    inClass: java.lang.String
                    outClass: java.lang.String
                    rewriteFunction: "#{@openApiRewriteFunction}"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: account-service
        url: /account-service/v3/api-docs
      - name: transaction-service
        url: /transaction-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs
