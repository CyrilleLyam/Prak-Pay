server:
  port: 8082

spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/transaction
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Xk7mN9vpQL2nRw4j}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: transaction-pool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      keepalive-time: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
